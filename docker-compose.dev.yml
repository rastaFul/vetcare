version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: vetcare_dev
      POSTGRES_USER: vetcare
      POSTGRES_PASSWORD: vetcare_secret
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vetcare"]
      interval: 5s
      timeout: 3s
      retries: 10

  postgres_test:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: vetcare_test
      POSTGRES_USER: vetcare
      POSTGRES_PASSWORD: vetcare_secret

volumes:
  postgres_dev_data:
